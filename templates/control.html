<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Parking System Control</title>
    <style>
      body { font-family: Arial, Helvetica, sans-serif; background:#f5f7fb; color:#222; padding:24px }
      .panel { max-width:1000px; margin:0 auto; background:white; padding:18px; border-radius:8px; box-shadow:0 6px 18px rgba(0,0,0,0.06) }
      .row { display:flex; gap:12px; align-items:center }
      button { padding:10px 14px; border-radius:6px; border:none; cursor:pointer; font-weight:600 }
      .btn-start { background:#28a745; color:white }
      .btn-stop { background:#dc3545; color:white }
      .status { margin-left:12px; font-weight:700 }
      .log { height:420px; overflow:auto; background:#0b1220; color:#d6e8ff; padding:12px; border-radius:6px; margin-top:12px; font-family:monospace; font-size:13px }
      .toolbar { display:flex; justify-content:space-between; align-items:center }
      .reports { background:#007bff; color:white }
      pre { white-space:pre-wrap }
    </style>
  </head>
  <body>
    <div class="panel">
      <div class="toolbar">
        <h2>Parking System — Control Panel</h2>
        <div><small>Engine: <span id="engine-status">...</span></small></div>
      </div>

      <div class="row" style="margin-top:12px">
        <button class="btn-start" id="start">Start System</button>
        <button class="btn-stop" id="stop">Stop System</button>
        <button class="reports" id="reports">Open Reports</button>
        <div class="status" id="status-text">Status: <strong id="status-val">...</strong></div>
      </div>

      <div style="margin-top:14px">
        <div style="font-weight:700;margin-bottom:8px">Live Log</div>
        <div id="log" class="log"></div>
      </div>

      <div id="reports-output" style="margin-top:12px; display:none">
        <h3>Reports Output</h3>
        <pre id="reports-pre"></pre>
      </div>
    </div>

    <script>
      const startBtn = document.getElementById('start');
      const stopBtn = document.getElementById('stop');
      const reportsBtn = document.getElementById('reports');
      const statusVal = document.getElementById('status-val');
      const logEl = document.getElementById('log');
      const engineStatus = document.getElementById('engine-status');

      async function fetchStatus(){
        try{
          const r = await fetch('/api/status');
          const j = await r.json();
          statusVal.textContent = j.running ? 'Running (PID='+j.pid+')' : 'Stopped';
        }catch(e){ statusVal.textContent = 'Unknown' }
      }

      startBtn.addEventListener('click', async ()=>{
        startBtn.disabled = true;
        const r = await fetch('/api/start',{method:'POST'});
        const j = await r.json();
        appendLog('[UI] '+j.message);
        await fetchStatus();
        startBtn.disabled = false;
      });

      stopBtn.addEventListener('click', async ()=>{
        stopBtn.disabled = true;
        const r = await fetch('/api/stop',{method:'POST'});
        const j = await r.json();
        appendLog('[UI] '+j.message);
        await fetchStatus();
        stopBtn.disabled = false;
      });

      reportsBtn.addEventListener('click', async ()=>{
        reportsBtn.disabled = true;
        const r = await fetch('/api/reports',{method:'POST'});
        const j = await r.json();
        document.getElementById('reports-output').style.display='block';
        document.getElementById('reports-pre').textContent = j.output || j.error || JSON.stringify(j);
        reportsBtn.disabled = false;
      });

      function appendLog(text){
        const now = new Date().toLocaleTimeString();
        logEl.innerText += `[${now}] ${text}\n`;
        logEl.scrollTop = logEl.scrollHeight;
      }

      // SSE log stream
      const sse = new EventSource('/logs');
      sse.onmessage = (e)=>{
        try{ const obj = JSON.parse(e.data); appendLog(obj.line); }catch(err){}
      };
      sse.onerror = ()=>{ appendLog('[UI] Log stream disconnected'); }

      // initial status
      fetchStatus();
      setInterval(fetchStatus,3000);
    </script>
  </body>
</html>
